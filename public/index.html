<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Scorer - Live Scoring</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-dark: #0d47a1;
            --primary: #1565c0;
            --primary-light: #1976d2;
            --accent: #ff6b35;
            --accent-light: #ffb84d;
            --danger: #d32f2f;
            --success: #388e3c;
            --warning: #f57c00;
            --bg: #f5f5f5;
            --surface: #ffffff;
            --text: #212121;
            --text-secondary: #666666;
            --border: #e0e0e0;
            --shadow: 0 2px 8px rgba(0,0,0,0.1);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.15);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0d47a1 0%, #1565c0 100%);
            color: var(--text);
            min-height: 100vh;
            padding: 12px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* Setup Screen */
        .setup-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .setup-card {
            background: white;
            border-radius: 20px;
            padding: 32px;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 500px;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .setup-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .setup-header h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .setup-header p {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .team-badges {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .team-badge {
            font-size: 24px;
            font-weight: 700;
            padding: 8px 16px;
            border-radius: 8px;
            background: var(--bg);
            color: var(--primary);
        }

        .section {
            margin-bottom: 24px;
        }

        .section-label {
            font-size: 13px;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .batsman-mode {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .mode-btn {
            padding: 16px;
            border: 2px solid var(--border);
            background: white;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .mode-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .player-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }

        .player-btn {
            padding: 14px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: white;
            color: var(--text);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .player-btn:active {
            transform: scale(0.98);
        }

        .player-btn.selected {
            border-color: var(--primary);
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(21, 101, 192, 0.3);
        }

        .player-btn.selected::after {
            content: '✓';
            position: absolute;
            top: 4px;
            right: 8px;
            font-weight: 700;
        }

        .start-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(21, 101, 192, 0.3);
        }

        .start-btn:active {
            transform: scale(0.98);
        }

        .start-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Match Screen */
        .match-screen {
            display: none;
            padding-bottom: 20px;
            animation: fadeIn 0.3s ease;
        }

        .match-screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* Score Display - Main Focus */
        .score-display {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border-radius: 16px;
            padding: 24px;
            color: white;
            margin-bottom: 16px;
            box-shadow: var(--shadow-lg);
            text-align: center;
        }

        .score-main {
            font-size: 72px;
            font-weight: 900;
            font-family: 'Courier New', monospace;
            margin-bottom: 16px;
            line-height: 1;
        }

        .score-meta {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }

        .meta-item {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            padding: 8px;
        }

        .meta-label {
            font-size: 10px;
            text-transform: uppercase;
            opacity: 0.8;
            font-weight: 600;
        }

        .meta-value {
            font-size: 20px;
            font-weight: 700;
            margin-top: 4px;
        }

        /* Scoring Buttons - Primary */
        .scoring-grid {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
        }

        .score-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }

        .score-buttons.wide {
            grid-template-columns: 1fr 1fr;
        }

        button {
            padding: 16px 12px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button:active {
            transform: scale(0.92);
        }

        .btn-score {
            background: var(--accent);
            color: white;
            font-size: 18px;
        }

        .btn-score:hover {
            background: #ff5722;
        }

        .btn-four {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
            color: white;
            font-size: 20px;
            font-weight: 900;
        }

        .btn-six {
            background: var(--danger);
            color: white;
            font-size: 20px;
            font-weight: 900;
        }

        .btn-six:hover {
            background: #b71c1c;
        }

        .btn-action {
            background: var(--primary);
            color: white;
            font-size: 14px;
        }

        .btn-action:hover {
            background: var(--primary-dark);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
            font-size: 14px;
        }

        .btn-danger:hover {
            background: #b71c1c;
        }

        .btn-secondary {
            background: var(--bg);
            color: var(--text);
            border: 2px solid var(--border);
            font-size: 14px;
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        /* Player Info - Secondary */
        .batsmen-info {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
        }

        .batsman-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: var(--bg);
            border-radius: 10px;
            margin-bottom: 12px;
        }

        .batsman-card:last-child {
            margin-bottom: 0;
        }

        .batsman-info-col {
            flex: 1;
        }

        .batsman-name {
            font-size: 15px;
            font-weight: 700;
            color: var(--primary);
        }

        .batsman-stats {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .batsman-buttons {
            display: flex;
            gap: 8px;
            margin-left: 12px;
        }

        .batsman-buttons button {
            padding: 6px 10px;
            font-size: 12px;
            border-radius: 6px;
        }

        .bowler-info {
            background: white;
            border-radius: 12px;
            padding: 16px;
            box-shadow: var(--shadow);
        }

        .bowler-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .bowler-row:last-child {
            margin-bottom: 0;
        }

        .bowler-col {
            flex: 1;
        }

        .bowler-name {
            font-size: 15px;
            font-weight: 700;
            color: var(--primary);
        }

        .bowler-stats {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .action-buttons button {
            flex: 1;
            padding: 12px 8px;
            font-size: 13px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 24px;
            width: 90%;
            max-width: 450px;
            box-shadow: var(--shadow-lg);
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 16px;
        }

        .modal-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
        }

        .modal-btn {
            padding: 12px;
            border: 2px solid var(--border);
            background: white;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .modal-btn.selected {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .modal-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
        }

        .confirm-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 16px;
        }

        .confirm-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        @media (max-width: 480px) {
            .score-main {
                font-size: 56px;
            }

            .score-buttons {
                gap: 10px;
            }

            button {
                padding: 14px 10px;
                font-size: 15px;
            }

            .batsman-card {
                flex-direction: column;
                align-items: flex-start;
            }

            .batsman-buttons {
                margin-left: 0;
                margin-top: 8px;
                width: 100%;
            }

            .batsman-buttons button {
                flex: 1;
            }
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Setup Screen -->
    <div class="setup-screen" id="setupScreen">
        <div class="setup-card">
            <div class="setup-header">
                <h1>🏏 Cricket Scorer</h1>
                <p>Seletar Sharks vs Mandai Monks</p>
                <div class="team-badges">
                    <div class="team-badge">🦈 Sharks</div>
                    <div class="team-badge">🐵 Monks</div>
                </div>
            </div>

            <div class="section">
                <div class="section-label">Batting Setup</div>
                <div class="batsman-mode">
                    <button class="mode-btn active" onclick="setBatsmanMode(1)">1 Batsman</button>
                    <button class="mode-btn" onclick="setBatsmanMode(2)">2 Batsmen</button>
                </div>
            </div>

            <div class="section">
                <div class="section-label">Select Batsman</div>
                <div class="player-grid" id="batsmanGrid"></div>
                <div class="player-grid" id="batsmanGrid2" style="display: none;"></div>
            </div>

            <div class="section">
                <div class="section-label">Select Bowler</div>
                <div class="player-grid" id="bowlerGrid"></div>
            </div>

            <button class="start-btn" id="startBtn" disabled>Start Match</button>
        </div>
    </div>

    <!-- Match Screen -->
    <div class="match-screen" id="matchScreen">
        <div class="container">
            <!-- Live Score Display -->
            <div class="score-display">
                <div class="score-main" id="currentScore">0</div>
                <div class="score-meta">
                    <div class="meta-item">
                        <div class="meta-label">Wickets</div>
                        <div class="meta-value" id="displayWickets">0/10</div>
                    </div>
                    <div class="meta-item">
                        <div class="meta-label">Overs</div>
                        <div class="meta-value" id="displayOvers">0.0</div>
                    </div>
                    <div class="meta-item">
                        <div class="meta-label">RR</div>
                        <div class="meta-value" id="displayRR">0.0</div>
                    </div>
                    <div class="meta-item">
                        <div class="meta-label">Balls</div>
                        <div class="meta-value" id="displayBalls">0</div>
                    </div>
                </div>
            </div>

            <!-- Scoring Buttons -->
            <div class="scoring-grid">
                <div class="score-buttons">
                    <button class="btn-score" onclick="addRuns(1)">1 RUN</button>
                    <button class="btn-score" onclick="addRuns(2)">2 RUNS</button>
                    <button class="btn-score" onclick="addRuns(3)">3 RUNS</button>
                </div>
                <div class="score-buttons wide">
                    <button class="btn-four" onclick="addRuns(4)">4 RUNS</button>
                    <button class="btn-six" onclick="addRuns(6)">6 RUNS</button>
                </div>
                <div class="score-buttons wide" style="margin-top: 12px;">
                    <button class="btn-action" onclick="addWide()">Wide</button>
                    <button class="btn-action" onclick="addNoBall()">No Ball</button>
                </div>
                <div class="score-buttons wide" style="margin-top: 12px;">
                    <button class="btn-danger" onclick="addWicket()">Wicket</button>
                    <button class="btn-secondary" onclick="nextBall()">Next Ball</button>
                </div>
            </div>

            <!-- Batsmen Info -->
            <div class="batsmen-info" id="batmenInfo"></div>

            <!-- Bowler Info -->
            <div class="bowler-info">
                <div class="bowler-row">
                    <div class="bowler-col">
                        <div class="bowler-name" id="bowlerName">-</div>
                        <div class="bowler-stats" id="bowlerStats">0 runs, 0 balls</div>
                    </div>
                    <button class="btn-secondary" onclick="changeBowler()" style="padding: 8px 12px; font-size: 12px;">Change</button>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons" style="margin-top: 16px;">
                <button class="btn-secondary" onclick="undoLastBall()">↶ Undo</button>
                <button class="btn-secondary" onclick="showResetModal()">🔄 Reset</button>
            </div>
        </div>
    </div>

    <!-- Change Batsman Modal -->
    <div class="modal" id="batsmanModal">
        <div class="modal-content">
            <div class="modal-title">Change Batsman</div>
            <div class="modal-grid" id="batsmanSelectGrid"></div>
            <button class="confirm-btn" onclick="confirmBatsmanChange()">Confirm</button>
        </div>
    </div>

    <!-- Change Bowler Modal -->
    <div class="modal" id="bowlerModal">
        <div class="modal-content">
            <div class="modal-title">Change Bowler</div>
            <div class="modal-grid" id="bowlerSelectGrid"></div>
            <button class="confirm-btn" onclick="confirmBowlerChange()">Confirm</button>
        </div>
    </div>

    <!-- Reset Modal -->
    <div class="modal" id="resetModal">
        <div class="modal-content">
            <div class="modal-title">Reset Match?</div>
            <p style="color: var(--text-secondary); margin-bottom: 16px;">This will clear all match data. Are you sure?</p>
            <div class="modal-buttons">
                <button class="btn-secondary" onclick="closeResetModal()">Cancel</button>
                <button class="btn-danger" onclick="resetAll()">Reset All</button>
            </div>
        </div>
    </div>

    <script>
        const players = ['Vikas', 'Arpit', 'Naren', 'Shiprak', 'Vaibhav', 'Pranay', 'Trijal', 'Hrushi', 'Sandeep', 'Pradeep', 'Amit', 'Anurag'];

        let batsmanMode = 1;
        let state = {
            batsman1: null,
            batsman2: null,
            bowler: null,
            totalRuns: 0,
            totalWickets: 0,
            totalBalls: 0,
            batsman1Runs: 0,
            batsman1Balls: 0,
            batsman2Runs: 0,
            batsman2Balls: 0,
            bowlerRuns: 0,
            bowlerBalls: 0,
            history: [],
            playerStats: {}
        };

        // Initialize player stats
        players.forEach(p => {
            state.playerStats[p] = { runs: 0, balls: 0, wickets: 0, bowlRuns: 0, bowlBalls: 0 };
        });

        function setBatsmanMode(mode) {
            batsmanMode = mode;
            document.querySelectorAll('.mode-btn').forEach((btn, idx) => {
                btn.classList.toggle('active', (idx + 1) === mode);
            });
            document.getElementById('batsmanGrid2').style.display = mode === 2 ? 'grid' : 'none';
            state.batsman1 = null;
            state.batsman2 = null;
            updateSetupUI();
        }

        function renderSetup() {
            const batsmanGrid = document.getElementById('batsmanGrid');
            const batsmanGrid2 = document.getElementById('batsmanGrid2');
            const bowlerGrid = document.getElementById('bowlerGrid');
            
            batsmanGrid.innerHTML = players.map(p => 
                `<button class="player-btn" data-player="${p}" onclick="selectBatsman1('${p}')">${p}</button>`
            ).join('');

            batsmanGrid2.innerHTML = players.map(p => 
                `<button class="player-btn" data-player="${p}" onclick="selectBatsman2('${p}')">${p}</button>`
            ).join('');
            
            bowlerGrid.innerHTML = players.map(p => 
                `<button class="player-btn" data-player="${p}" onclick="selectBowler('${p}')">${p}</button>`
            ).join('');

            updateSetupUI();
        }

        function selectBatsman1(player) {
            state.batsman1 = player;
            updateSetupUI();
        }

        function selectBatsman2(player) {
            state.batsman2 = player;
            updateSetupUI();
        }

        function selectBowler(player) {
            state.bowler = player;
            updateSetupUI();
        }

        function updateSetupUI() {
            document.querySelectorAll('#batsmanGrid .player-btn').forEach(btn => {
                btn.classList.toggle('selected', btn.dataset.player === state.batsman1);
            });
            document.querySelectorAll('#batsmanGrid2 .player-btn').forEach(btn => {
                btn.classList.toggle('selected', btn.dataset.player === state.batsman2);
            });
            document.querySelectorAll('#bowlerGrid .player-btn').forEach(btn => {
                btn.classList.toggle('selected', btn.dataset.player === state.bowler);
            });
            
            const batsmanReady = batsmanMode === 1 ? state.batsman1 : (state.batsman1 && state.batsman2);
            document.getElementById('startBtn').disabled = !batsmanReady || !state.bowler;
        }

        function startMatch() {
            state.batsman1Runs = 0;
            state.batsman1Balls = 0;
            state.batsman2Runs = 0;
            state.batsman2Balls = 0;
            state.bowlerRuns = 0;
            state.bowlerBalls = 0;
            
            document.getElementById('setupScreen').classList.add('hidden');
            document.getElementById('matchScreen').classList.add('active');
            renderMatch();
        }

        function renderBatmenInfo() {
            const batmenInfo = document.getElementById('batmenInfo');
            let html = '';

            html += `
                <div class="batsman-card">
                    <div class="batsman-info-col">
                        <div class="batsman-name">${state.batsman1}</div>
                        <div class="batsman-stats">${state.batsman1Runs} runs • ${state.batsman1Balls} balls</div>
                    </div>
                    <div class="batsman-buttons">
                        <button class="btn-secondary" onclick="changeBatsman1()" style="padding: 6px 10px; font-size: 12px;">Change</button>
                    </div>
                </div>
            `;

            if (batsmanMode === 2 && state.batsman2) {
                html += `
                    <div class="batsman-card">
                        <div class="batsman-info-col">
                            <div class="batsman-name">${state.batsman2}</div>
                            <div class="batsman-stats">${state.batsman2Runs} runs • ${state.batsman2Balls} balls</div>
                        </div>
                        <div class="batsman-buttons">
                            <button class="btn-secondary" onclick="changeBatsman2()" style="padding: 6px 10px; font-size: 12px;">Change</button>
                        </div>
                    </div>
                `;
            }

            batmenInfo.innerHTML = html;
        }

        function renderMatch() {
            document.getElementById('currentScore').textContent = state.totalRuns;
            document.getElementById('displayWickets').textContent = `${state.totalWickets}/10`;
            
            const overs = Math.floor(state.totalBalls / 6);
            const ballsInOver = state.totalBalls % 6;
            document.getElementById('displayOvers').textContent = `${overs}.${ballsInOver}`;
            document.getElementById('displayBalls').textContent = state.totalBalls;
            
            const runRate = state.totalBalls > 0 ? (state.totalRuns / (overs + ballsInOver / 6)).toFixed(1) : '0.0';
            document.getElementById('displayRR').textContent = runRate;

            renderBatmenInfo();

            document.getElementById('bowlerName').textContent = state.bowler;
            document.getElementById('bowlerStats').textContent = `${state.bowlerRuns} runs • ${state.bowlerBalls} balls`;
        }

        function addRuns(runs) {
            state.history.push(JSON.parse(JSON.stringify(state)));
            state.totalRuns += runs;
            state.batsman1Runs += runs;
            state.bowlerRuns += runs;
            state.batsman1Balls += 1;
            state.bowlerBalls += 1;
            state.totalBalls += 1;
            state.playerStats[state.batsman1].runs += runs;
            state.playerStats[state.batsman1].balls += 1;
            state.playerStats[state.bowler].bowlRuns += runs;
            state.playerStats[state.bowler].bowlBalls += 1;
            renderMatch();
        }

        function addWide() {
            state.history.push(JSON.parse(JSON.stringify(state)));
            state.totalRuns += 1;
            state.bowlerRuns += 1;
            state.playerStats[state.bowler].bowlRuns += 1;
            renderMatch();
        }

        function addNoBall() {
            state.history.push(JSON.parse(JSON.stringify(state)));
            state.totalRuns += 1;
            state.bowlerRuns += 1;
            state.playerStats[state.bowler].bowlRuns += 1;
            renderMatch();
        }

        function addWicket() {
            state.history.push(JSON.parse(JSON.stringify(state)));
            state.totalWickets += 1;
            state.batsman1Balls += 1;
            state.bowlerBalls += 1;
            state.totalBalls += 1;
            state.playerStats[state.batsman1].balls += 1;
            state.playerStats[state.bowler].bowlBalls += 1;
            state.playerStats[state.bowler].wickets += 1;
            renderMatch();
        }

        function nextBall() {
            state.batsman1Runs = 0;
            state.batsman1Balls = 0;
            state.bowlerRuns = 0;
            state.bowlerBalls = 0;
            renderMatch();
        }

        function changeBatsman1() {
            const grid = document.getElementById('batsmanSelectGrid');
            grid.innerHTML = players.map(p => 
                `<button class="modal-btn ${p === state.batsman1 ? 'selected' : ''}" data-player="${p}" onclick="selectNewBatsman1('${p}')">${p}</button>`
            ).join('');
            document.getElementById('batsmanModal').classList.add('active');
        }

        function changeBatsman2() {
            const grid = document.getElementById('batsmanSelectGrid');
            grid.innerHTML = players.map(p => 
                `<button class="modal-btn ${p === state.batsman2 ? 'selected' : ''}" data-player="${p}" onclick="selectNewBatsman2('${p}')">${p}</button>`
            ).join('');
            document.getElementById('batsmanModal').classList.add('active');
        }

        function selectNewBatsman1(player) {
            state.batsman1 = player;
            document.querySelectorAll('#batsmanSelectGrid .modal-btn').forEach(btn => {
                btn.classList.toggle('selected', btn.dataset.player === player);
            });
        }

        function selectNewBatsman2(player) {
            state.batsman2 = player;
            document.querySelectorAll('#batsmanSelectGrid .modal-btn').forEach(btn => {
                btn.classList.toggle('selected', btn.dataset.player === player);
            });
        }

        function confirmBatsmanChange() {
            state.batsman1Runs = 0;
            state.batsman1Balls = 0;
            state.batsman2Runs = 0;
            state.batsman2Balls = 0;
            document.getElementById('batsmanModal').classList.remove('active');
            renderMatch();
        }

        function changeBowler() {
            const grid = document.getElementById('bowlerSelectGrid');
            grid.innerHTML = players.map(p => 
                `<button class="modal-btn ${p === state.bowler ? 'selected' : ''}" data-player="${p}" onclick="selectNewBowler('${p}')">${p}</button>`
            ).join('');
            document.getElementById('bowlerModal').classList.add('active');
        }

        function selectNewBowler(player) {
            state.bowler = player;
            document.querySelectorAll('#bowlerSelectGrid .modal-btn').forEach(btn => {
                btn.classList.toggle('selected', btn.dataset.player === player);
            });
        }

        function confirmBowlerChange() {
            state.bowlerRuns = 0;
            state.bowlerBalls = 0;
            document.getElementById('bowlerModal').classList.remove('active');
            renderMatch();
        }

        function undoLastBall() {
            if (state.history.length > 0) {
                state = state.history.pop();
                renderMatch();
            }
        }

        function showResetModal() {
            document.getElementById('resetModal').classList.add('active');
        }

        function closeResetModal() {
            document.getElementById('resetModal').classList.remove('active');
        }

        function resetAll() {
            state = {
                batsman1: null,
                batsman2: null,
                bowler: null,
                totalRuns: 0,
                totalWickets: 0,
                totalBalls: 0,
                batsman1Runs: 0,
                batsman1Balls: 0,
                batsman2Runs: 0,
                batsman2Balls: 0,
                bowlerRuns: 0,
                bowlerBalls: 0,
                history: [],
                playerStats: {}
            };
            players.forEach(p => {
                state.playerStats[p] = { runs: 0, balls: 0, wickets: 0, bowlRuns: 0, bowlBalls: 0 };
            });
            batsmanMode = 1;
            closeResetModal();
            document.getElementById('setupScreen').classList.remove('hidden');
            document.getElementById('matchScreen').classList.remove('active');
            renderSetup();
        }

        document.getElementById('startBtn').onclick = startMatch;

        // Initialize
        renderSetup();
    </script>
</body>
</html>
